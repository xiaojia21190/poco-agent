repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.14.10
    hooks:
      - id: ruff-check
        name: backend · lint
      - id: ruff-format
        name: backend · format

  - repo: local
    hooks:
      - id: pyrefly-backend
        name: backend - typecheck
        entry: uv run --directory backend --frozen --with pyrefly==0.47.0 pyrefly check
        language: system
        pass_filenames: false
        files: ^backend/.*\.pyi?$

      - id: pyrefly-executor
        name: executor - typecheck
        entry: uv run --directory executor --frozen --with pyrefly==0.47.0 pyrefly check
        language: system
        pass_filenames: false
        files: ^executor/.*\.pyi?$

      - id: pyrefly-executor-manager
        name: executor_manager - typecheck
        entry: uv run --directory executor_manager --frozen --with pyrefly==0.47.0 pyrefly check
        language: system
        pass_filenames: false
        files: ^executor_manager/.*\.pyi?$

      # - id: pyrefly-im
      #   name: im - typecheck
      #   entry: uv run --directory im --frozen --with pyrefly==0.47.0 pyrefly check
      #   language: system
      #   pass_filenames: false
      #   files: ^im/.*\.pyi?$

  - repo: local
    hooks:
      - id: frontend-eslint
        name: frontend - lint
        entry: node frontend/node_modules/eslint/bin/eslint.js --config frontend/eslint.config.mjs
        language: system
        files: ^frontend/.*\.[jt]sx?$
        types: [file]

      - id: frontend-prettier
        name: frontend - format
        entry: node frontend/node_modules/prettier/bin/prettier.cjs --write
        language: system
        files: ^frontend/.*\.(css|html|js|jsx|json|md|mjs|ts|tsx|yaml|yml)$
