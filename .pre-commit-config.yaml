repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.9
    hooks:
      - id: ruff-check
        name: backend · lint
        exclude: ^backend/assets/
        args: [backend, executor, executor_manager]
      - id: ruff-format
        name: backend · format
        exclude: ^backend/assets/
        args: [backend, executor, executor_manager]

  - repo: https://github.com/facebook/pyrefly-pre-commit
    rev: 0.47.0
    hooks:
      - id: pyrefly-check
        name: backend · typecheck
        exclude: ^backend/assets/
        pass_filenames: true
        language: system
      - id: pyrefly-check
        name: executor · typecheck
        entry: bash -c 'cd executor && uv run --frozen --with pyrefly==0.47.0 pyrefly check'
        pass_filenames: false
        language: system
        always_run: true
      - id: pyrefly-check
        name: executor_manager · typecheck
        entry: bash -c 'cd executor_manager && uv run --frozen --with pyrefly==0.47.0 pyrefly check'
        pass_filenames: false
        language: system
        always_run: true

  - repo: https://github.com/pre-commit/mirrors-eslint
    rev: v9.39.1
    hooks:
      - id: eslint
        name: frontend · lint
        exclude: ^backend/assets/
        args: ["--config", "frontend/eslint.config.mjs"]
        files: ^frontend/.*\.[jt]sx?$
        types: [file]
        additional_dependencies:
          - eslint@9.39.1
          - eslint-config-next@16.1.1
          - eslint-config-prettier@10.1.8

  - repo: https://github.com/rbubley/mirrors-prettier
    rev: v3.7.4
    hooks:
      - id: prettier
        name: frontend · format
        exclude: ^backend/assets/
